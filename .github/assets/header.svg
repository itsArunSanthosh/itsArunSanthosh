<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="100%" height="100%" fill="#020617"/>

  <!-- Grid -->
  <g opacity="0.08">
    <defs>
      <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#38BDF8" stroke-width="0.5"/>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#grid)"/>
  </g>

  <!-- Glow line -->
  <line x1="0" y1="200" x2="900" y2="200" stroke="#38BDF8" stroke-width="1" opacity="0.4"/>

  <!-- Text styles -->
  <style>
    .text {
      font-family: 'Fira Code', monospace;
      fill: #C0C0C0;
      font-size: 28px;
    }

    .cursor {
      fill: #38BDF8;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 50%, 100% { opacity: 1; }
      25%, 75% { opacity: 0; }
    }

    .line1 {
      overflow: hidden;
      white-space: nowrap;
      width: 0;
      animation: typing1 2s steps(30, end) forwards;
    }

    .line2 {
      overflow: hidden;
      white-space: nowrap;
      width: 0;
      animation: typing2 2.2s steps(50, end) forwards;
      animation-delay: 2.2s;
    }

    .line3 {
      overflow: hidden;
      white-space: nowrap;
      width: 0;
      animation: typing3 2.5s steps(60, end) forwards;
      animation-delay: 4.6s;
    }

    @keyframes typing1 { to { width: 280px; } }
    @keyframes typing2 { to { width: 650px; } }
    @keyframes typing3 { to { width: 750px; } }
  </style>

  <!-- Text -->
  <text x="40" y="70" class="text line1">Hi, I am Arun</text>
  <text x="40" y="120" class="text line2">AI/ML Engineer | Cybersecurity Enthusiast</text>
  <text x="40" y="170" class="text line3">Building Real-Time Intelligent Systems</text>

  <!-- Cursor -->
  <rect x="780" y="155" width="8" height="20" class="cursor"/>
</svg>
